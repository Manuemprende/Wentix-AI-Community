version: '3.8'

services:
  wentix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wentix-ai-community
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - APP_URL=${APP_URL:-https://wentix.ai}
    volumes:
      - ./leads_database.json:/app/leads_database.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

